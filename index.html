<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="/img/culturama-favico.png">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <img src="/img/logo-culturama.png" alt="Logo da Culturama">
        <h1>Pesquisa Online</h1>
    </header>

    <section>
        <form action="" method="get">

             <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="name">Nome</label>
                <input type="text" id="name" name="userName" required>
                <br>
                <label for="age">Idade</label>
                <input type="number" id="age" name="userAge" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de Nascimento</label>
                <input type="date" id="birthDate" name="userBirthDate">
                <br>
                <label for="email">E-mail</label>
                <input type="email" id="email" name="userEmail">
                <br>
                <label for="phoneNumber">Telefone</label>
                <input type="tel" id="phoneNumber" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + número sem espaços ou hifén" required>
                <br>
                <label for="image">Foto</label>
                <input type="file" accept="image/*" id="image" name="userPhoto" required>
                <br>
            
            </fieldset> 

            <fieldset>
                <legend>Perfil</legend>
                <p>Gênero</p>

                <input type="radio" id="male" name="userGender" value="Masculino">
                <label for="male">Masculino</label>

                <input type="radio" id="female" name="userGender" value="Feminino">
                <label for="female">Feminino</label>

                <input type="radio" id="notInformed" name="userGender" value="notInformed">
                <label for="notInformed">Prefiro não informar</label>
                <br>

                <label for="maritalStatus">Estado Civil</label>
                <select name="maritalStatus" id="maritalStatus">
                    <option value="notInformed">Selecione</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="uniaoEstavel">União Estável</option>
                    <option value="viuvo">Viúvo</option>
                    <br>
                </select>
               
                <label for="state">Estado:</label>
                <select name="userState" id="state" required>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritoFederal">Distrito Federal</option>
                    <option value="espiritoSanto">Espirito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhao">Maranhão</option>
                    <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                    <option value="matoGrosso">Mato Grosso</option>
                    <option value="minasGerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraíba">Paraíba</option>
                    <option value="paraná">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="rioDeJaneiro">Rio de Janeiro</option>
                    <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                    <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santaCatarina">Santa Catarina</option>
                    <option value="saoPaulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>

                <label for="userCity">Cidade:</label>
                <input type="text" id="userCity" autocomplete="address-level2" placeholder="Ex.:Fortaleza">
                <br>

            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais</p>
                <input type="checkbox" name="social" id="instagram" value="instagram">
                <label for="instagram">Instagram</label>
                <br>

                <input type="checkbox" name="social" id="facebook" value="facebook">
                <label for="facebook">Facebook</label>
                <br>

                <input type="checkbox" name="social" id="linkedin" value="linkedIn">
                <label for="linkedin">LinkedIn</label>
                <br>

                <input type="checkbox" name="social" id="x" value="X">
                <label for="x">X</label>
                <br>

                <label for="musicStyle">Estilo Musical</label>
                <input list="styleTypes" type="text" id="musicStyle" name="userMusicStyle">
                <datalist id="styleTypes">
                    <option value="Rock">
                    <option value="Pop">
                    <option value="Samba">
                    <option value="Pagode">
                    <option value="Funk">
                    <option value="Sertanejo">
                    <option value="Forró">
                </datalist>
                <br>
                
                <label for="favoriteColor">Cor favorita:</label>
                <input type="color" id="favoriteColor" name="userColor">
            </fieldset>

            
            <fieldset>
                <legend>Opinião</legend>
                <p>O que você acha da qualidade do nosso serviço?</p>

                <input type="radio" id="otimo" name="UserServiceOpinion" value="otima">
                <label for="otimo">Ótima</label>
                <br>

                <input type="radio" id="bom" name="UserServiceOpinion" value="boa">
                <label for="bom">Boa</label>
                <br>

                <input type="radio" id="regular" name="UserServiceOpinion" value="regular">
                <label for="regular">Regular</label>
                <br> 

                <input type="radio" id="ruim" name="UserServiceOpinion" value="ruim">
                <label for="ruim">Ruim</label>
                <br> 

                <label for="comment">Escreva a sua opinião:</label><br>
                <textarea id="comment" name="userComment" placeholder="Digite aqui..."></textarea>
                
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox" id="userLgpd" name="userLgpdTerm" required value="accepted">
                <label for="userLgpd">Eu aceito participar da pesquisa.</label>

                <input type="checkbox" id="userResult" name="userGetResults" value="accepted">
                <label for="userResult">Desejo receber os resultados por e-mail.</label>

            </fieldset>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>

    </section>

</body>
</html>
