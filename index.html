<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>

    <section>
        <form action="" method="get">

            <fieldset>
                
                <!-- DADOS PESSOAIS -->

                <legend>Dados Pessoais</legend>
                <label for="username">Nome</label>
                <input type="text" name="userName" required>
                <br>
                <label for="age">Idade</label>
                <input type="number" name="age" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de Nascimento</label>
                <input type="date" name="birthDate">
                <br>
                <label for="userEmail">E-mail</label>
                <input type="email" name="userEmail">
                <br>
                <label for="userPhoneNumber">Telefone</label>
                <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + número sem espaços ou hifén" required>
                <br>
                <label for="userPhoto">Foto</label>
                <input type="file" accept="image/*" name="userPhoto" required>
                <br>
            
            </fieldset>

            <button type="submit">Enviar</button>
        </form>

    </section>

</body>
</html>
